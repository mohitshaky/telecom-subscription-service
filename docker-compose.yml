version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: telecom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: telecomdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -p${DB_PASSWORD:-root}
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: telecom-subscription-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/telecomdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-minimum-32-chars}
    ports:
      - "8082:8082"

volumes:
  mysql_data:
